<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сто Учет</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            background-color: black;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        /* Значок пользователя по центру вверху */
        .user-icon {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #f8f9fa;
            font-size: 50px;
            transition: opacity 0.3s ease;
            text-decoration: none;
        }
        
        .user-icon:hover {
            opacity: 0.7;
            color: #ffc107;
        }
        
        /* Добавляем отступ сверху для кнопок, чтобы не налезали на иконку */
        .buttons-wrapper {
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <!-- Значок пользователя по центру -->
    <a href="#" class="user-icon">
        <i class="fas fa-user-circle"></i>
    </a>
    
    <div class="buttons-wrapper">
        <div class="container p-2 px-4">
            <button class="btn btn-warning w-100 p-3">Касса</button>
        </div>
        <div class="container p-2 px-4">
            <button class="btn btn-warning w-100 p-3">Журнал</button>
        </div>
        <div class="container p-2 px-4">
            <button class="btn btn-warning w-100 p-3">Итоги</button>
        </div>
        <div class="container p-0 py-3">
            <div class="container px-4 my-3">
                <button class="btn btn-primary w-100 p-3">Услуга</button>
            </div>
            <div class="container px-4 my-3">
                <button class="btn btn-primary w-100 p-3">Запчасть</button>
            </div>
            <div class="container p-2 px-4 my-3">
                <button class="btn btn-danger w-100 p-3">Расход</button>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>    
</body>
</html>
