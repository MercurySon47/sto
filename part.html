<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сто Учет - Финансы</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        
        .buttons-wrapper {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
        }
        
        .form-control {
            background-color: #2d2d44;
            border-color: #3d3d5c;
            color: #ffffff;
        }
        
        .form-control:focus {
            background-color: #3d3d5c;
            border-color: #007acc;
            color: #ffffff;
            box-shadow: 0 0 0 0.25rem rgba(0, 122, 204, 0.25);
        }
        
        .form-control::placeholder {
            color: #888;
        }
        
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            opacity: 0.5;
        }
        
        /* Стили для модальных окон */
        .dark-modal .modal-content {
            background-color: #1a1a2e;
            color: #ffffff;
            border: 1px solid #2d2d44;
        }
        .dark-modal .modal-header {
            border-bottom-color: #2d2d44;
        }
        .dark-modal .modal-footer {
            border-top-color: #2d2d44;
        }
        .dark-modal .btn-close {
            filter: invert(1) grayscale(100%) brightness(200%);
        }
        .dark-modal .form-control.bg-light {
            background-color: #2d2d44 !important;
            color: #ffffff !important;
            border-color: #3d3d5c;
        }
        .dark-modal .form-label {
            color: #e0e0e0;
        }
        
        .btn-primary {
            background-color: #007acc;
            border-color: #007acc;
        }
        
        .btn-primary:hover {
            background-color: #005fa3;
            border-color: #005fa3;
        }
        
        .btn-cash {
            background-color: #28a745;
            border-color: #28a745;
            color: white;
        }
        
        .btn-cash:hover {
            background-color: #1e7e34;
            border-color: #1e7e34;
        }
        
        .btn-cash2 {
            background-color: #17a2b8;
            border-color: #17a2b8;
            color: white;
        }
        
        .btn-cash2:hover {
            background-color: #117a8b;
            border-color: #117a8b;
        }
        
        .btn-cash3 {
            background-color: #6c757d;
            border-color: #6c757d;
            color: white;
        }
        
        .btn-cash3:hover {
            background-color: #545b62;
            border-color: #545b62;
        }
    </style>
</head>
<body>
    <div class="buttons-wrapper">
        <div class="container px-4 my-3">
            <input type="text" id="partName" class="form-control form-control-lg text-center" value="Услуга С/У" placeholder="Наименование">
        </div>
        <div class="container px-4 my-3">
            <input type="number" id="partPrice" class="form-control form-control-lg text-center" placeholder="Сумма в руб." min="0" step="1">
        </div>
        <div class="container px-4 my-3">
            <button class="btn btn-primary w-100 p-3" id="showCashModalBtn">Добавить</button>
        </div>
        <div class="container px-4 my-3">
            <a href="index.html" class="w-100">
                <button class="btn btn-primary w-100 p-3">Назад</button>
            </a>
        </div>
    </div>

    <!-- Модальное окно выбора кассы -->
    <div class="modal fade dark-modal" id="cashModal" tabindex="-1" aria-labelledby="cashModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content mx-4">
                <div class="modal-header">
                    <h5 class="modal-title" id="cashModalLabel">💰 Выберите кассу</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Закрыть"></button>
                </div>
                <div class="modal-body">
                    <div class="d-grid gap-3">
                        <button class="btn btn-cash p-3" id="cashNal">
                            💵 Наличные
                        </button>
                        <button class="btn btn-cash2 p-3" id="cashBeznal">
                            💳 Безнал
                        </button>
                        <button class="btn btn-cash3 p-3" id="cashMir">
                            🌍 Перевод Мир
                        </button>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Назад</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Модальное окно успешного добавления -->
    <div class="modal fade dark-modal" id="successModal" tabindex="-1" aria-labelledby="successModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
            <div class="modal-content mx-4">
                <div class="modal-header">
                    <h5 class="modal-title" id="successModalLabel">✅ Запись добавлена</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Закрыть"></button>
                </div>
                <div class="modal-body">
                    <p>Информация о добавленной позиции:</p>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Наименование:</label>
                        <label id="modalPartName" class="form-control bg-light">-</label>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Сумма (руб.):</label>
                        <label id="modalPartPrice" class="form-control bg-light">-</label>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Тип операции:</label>
                        <label id="modalType" class="form-control bg-light">-</label>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Касса:</label>
                        <label id="modalCash" class="form-control bg-light">-</label>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" id="okButton" class="btn btn-primary w-100 py-2">OK</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        const STORAGE_KEY = 'sto_finance_records';
        
        const partNameInput = document.getElementById('partName');
        const partPriceInput = document.getElementById('partPrice');
        const showCashModalBtn = document.getElementById('showCashModalBtn');
        const modalPartName = document.getElementById('modalPartName');
        const modalPartPrice = document.getElementById('modalPartPrice');
        const modalType = document.getElementById('modalType');
        const modalCash = document.getElementById('modalCash');
        const okButton = document.getElementById('okButton');
        
        let selectedCash = null;
        let currentRecord = null;
        
        function getAllRecords() {
            const records = localStorage.getItem(STORAGE_KEY);
            return records ? JSON.parse(records) : [];
        }
        
        function saveRecord(record) {
            const records = getAllRecords();
            records.push(record);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
            console.log('Сохраненная запись:', record);
        }
        
        function generateId() {
            return Date.now() + '-' + Math.random().toString(36).substr(2, 9);
        }
        
        // Показываем модальное окно выбора кассы
        showCashModalBtn.addEventListener('click', function() {
            // Проверяем заполнены ли поля
            let nameValue = partNameInput.value.trim();
            let priceValue = parseFloat(partPriceInput.value);
            
            if (nameValue === '') {
                alert('Пожалуйста, заполните наименование');
                return;
            }
            
            if (isNaN(priceValue) || priceValue === '') {
                alert('Пожалуйста, введите сумму');
                return;
            }
            
            // Показываем модальное окно выбора кассы
            const cashModal = new bootstrap.Modal(document.getElementById('cashModal'));
            cashModal.show();
        });
        
        // Обработчики выбора кассы
        document.getElementById('cashNal').addEventListener('click', function() {
            selectedCash = 'Наличные';
            saveRecordAndShowModal();
        });
        
        document.getElementById('cashBeznal').addEventListener('click', function() {
            selectedCash = 'Безнал';
            saveRecordAndShowModal();
        });
        
        document.getElementById('cashMir').addEventListener('click', function() {
            selectedCash = 'Перевод Мир';
            saveRecordAndShowModal();
        });
        
        function saveRecordAndShowModal() {
            // Получаем значения
            let nameValue = partNameInput.value.trim();
            let priceValue = parseFloat(partPriceInput.value);
            
            if (nameValue === '') {
                nameValue = 'Не указано';
            }
            
            if (isNaN(priceValue)) {
                priceValue = 0;
            }
            
            let operationType = priceValue >= 0 ? 'Приход' : 'Расход';
            let signedAmount = priceValue;
            
            // Создаем запись с кассой
            currentRecord = {
                id: generateId(),
                name: nameValue,
                amount: signedAmount,
                type: operationType,
                cash: selectedCash,
                date: new Date().toLocaleString('ru-RU'),
                timestamp: Date.now()
            };
            
            // Сохраняем в базу
            saveRecord(currentRecord);
            
            // Закрываем модальное окно выбора кассы
            const cashModal = bootstrap.Modal.getInstance(document.getElementById('cashModal'));
            cashModal.hide();
            
            // Обновляем отображение в модальном окне успеха
            modalPartName.textContent = nameValue;
            modalPartPrice.textContent = Math.abs(signedAmount) + ' ₽';
            modalType.textContent = operationType + (operationType === 'Расход' ? ' ↓' : ' ↑');
            modalCash.textContent = selectedCash;
            
            if (operationType === 'Расход') {
                modalType.style.color = '#ff6b6b';
            } else {
                modalType.style.color = '#51cf66';
            }
            
            // Показываем модальное окно успеха
            const successModal = new bootstrap.Modal(document.getElementById('successModal'));
            successModal.show();
            
            // Очищаем поле суммы
            partPriceInput.value = '';
            selectedCash = null;
        }
        
        // При нажатии на кнопку OK переходим на index.html
        okButton.addEventListener('click', function() {
            window.location.href = 'index.html';
        });
        
        console.log('Существующие записи:', getAllRecords());
    </script>
</body>
</html>
