<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Сто Учет - Кассы</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 12px;
        }
        
        .container-custom {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
        }
        
        h1 {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            text-align: center;
        }
        
        .cash-card {
            background: #1e1e2e;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid #2d2d44;
            text-align: center;
        }
        
        .cash-name {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .cash-amount {
            font-size: 2rem;
            font-weight: bold;
            margin: 15px 0;
        }
        
        .cash-amount.positive {
            color: #51cf66;
        }
        
        .cash-amount.negative {
            color: #ff6b6b;
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 15px;
        }
        
        .btn-deposit {
            background-color: #28a745;
            border-color: #28a745;
            color: white;
            padding: 8px 25px;
            border-radius: 8px;
            font-size: 14px;
            border: none;
        }
        
        .btn-deposit:hover {
            background-color: #1e7e34;
        }
        
        .btn-withdraw {
            background-color: #dc3545;
            border-color: #dc3545;
            color: white;
            padding: 8px 25px;
            border-radius: 8px;
            font-size: 14px;
            border: none;
        }
        
        .btn-withdraw:hover {
            background-color: #bb2d3b;
        }
        
        .btn-back {
            background-color: #6c757d;
            border-color: #6c757d;
            color: white;
            padding: 12px;
            font-size: 16px;
            border-radius: 10px;
            width: 100%;
            border: none;
        }
        
        .btn-back:hover {
            background-color: #5a6268;
        }
        
        .stats-card {
            background: #1e1e2e;
            border: 1px solid #2d2d44;
            border-radius: 15px;
            padding: 15px;
            margin: 15px 0;
        }
        
        .total-amount {
            font-size: 1.3rem;
            font-weight: bold;
            text-align: center;
        }
        
        .dark-modal .modal-content {
            background-color: #1a1a2e;
            color: #ffffff;
            border: 1px solid #2d2d44;
        }
        .dark-modal .modal-header {
            border-bottom-color: #2d2d44;
        }
        .dark-modal .modal-footer {
            border-top-color: #2d2d44;
        }
        .dark-modal .btn-close {
            filter: invert(1) grayscale(100%) brightness(200%);
        }
        .dark-modal .form-control {
            background-color: #2d2d44;
            border-color: #3d3d5c;
            color: #ffffff;
        }
        .dark-modal .form-label {
            color: #e0e0e0;
        }
        
        @media (max-width: 480px) {
            .cash-amount {
                font-size: 1.6rem;
            }
            .btn-deposit, .btn-withdraw {
                padding: 6px 20px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <div class="container-custom">
        <h1>Кассы</h1>
        
        <!-- Карточки касс -->
        <div id="cashCards"></div>
        
        <!-- Общая статистика -->
        <div class="stats-card">
            <div class="total-amount">
                Всего в кассах: <strong id="totalCash" style="color: #51cf66;">0</strong> ₽
            </div>
        </div>
        
        <!-- Кнопка назад -->
        <a href="index.html" class="w-100">
            <button class="btn-back w-100 py-3">← Назад</button>
        </a>
    </div>

    <!-- Модальное окно для внесения/снятия -->
    <div class="modal fade dark-modal" id="operationModal" tabindex="-1" aria-labelledby="operationModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content mx-4">
                <div class="modal-header">
                    <h5 class="modal-title" id="operationModalLabel">💰 Операция с кассой</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Закрыть"></button>
                </div>
                <div class="modal-body">
                    <p id="modalCashName" class="fw-bold mb-3 text-center"></p>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Сумма (руб.):</label>
                        <input type="number" id="operationAmount" class="form-control form-control-lg text-center" placeholder="Введите сумму" min="0" step="1">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Наименование операции:</label>
                        <input type="text" id="operationName" class="form-control form-control-lg text-center" placeholder="Например: Внесение наличных">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                    <button type="button" id="confirmOperationBtn" class="btn btn-deposit">Подтвердить</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'sto_finance_records';
        
        let currentCash = null;
        let currentOperationType = null; // 'deposit' или 'withdraw'
        
        // Получение всех записей
        function getAllRecords() {
            const records = localStorage.getItem(STORAGE_KEY);
            return records ? JSON.parse(records) : [];
        }
        
        // Сохранение записи
        function saveRecord(record) {
            const records = getAllRecords();
            records.push(record);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
        }
        
        // Генерация ID
        function generateId() {
            return Date.now() + '-' + Math.random().toString(36).substr(2, 9);
        }
        
        // Расчет суммы по кассе
        function getCashAmount(cashName) {
            const records = getAllRecords();
            let total = 0;
            
            records.forEach(record => {
                if (record.cash === cashName) {
                    total += record.amount;
                }
            });
            
            return total;
        }
        
        // Получение всех сумм по кассам
        function getAllCashAmounts() {
            const cashNames = ['Наличные', 'Безнал', 'Перевод Мир'];
            const amounts = {};
            
            cashNames.forEach(cash => {
                amounts[cash] = getCashAmount(cash);
            });
            
            return amounts;
        }
        
        // Отображение карточек касс
        function displayCashCards() {
            const amounts = getAllCashAmounts();
            const container = document.getElementById('cashCards');
            
            container.innerHTML = '';
            
            let totalAll = 0;
            
            for (const [cashName, amount] of Object.entries(amounts)) {
                const amountClass = amount >= 0 ? 'positive' : 'negative';
                totalAll += amount;
                
                // Только для кассы "Наличные" добавляем кнопки
                const hasButtons = cashName === 'Наличные';
                
                const card = `
                    <div class="cash-card">
                        <div class="cash-name">${cashName}</div>
                        <div class="cash-amount ${amountClass}">
                            ${amount.toLocaleString('ru-RU')} ₽
                        </div>
                        ${hasButtons ? `
                            <div class="button-group">
                                <button class="btn-deposit" onclick="openOperationModal('${cashName}', 'deposit')">Внести</button>
                                <button class="btn-withdraw" onclick="openOperationModal('${cashName}', 'withdraw')">Снять</button>
                            </div>
                        ` : ''}
                    </div>
                `;
                container.innerHTML += card;
            }
            
            // Обновляем общую сумму
            const totalCashElement = document.getElementById('totalCash');
            totalCashElement.textContent = totalAll.toLocaleString('ru-RU');
            totalCashElement.style.color = totalAll >= 0 ? '#51cf66' : '#ff6b6b';
        }
        
        // Открытие модального окна для операции
        window.openOperationModal = function(cashName, operationType) {
            currentCash = cashName;
            currentOperationType = operationType;
            
            const modalTitle = document.getElementById('operationModalLabel');
            modalTitle.innerHTML = operationType === 'deposit' ? 
                '<i class="fas fa-plus-circle"></i> Внести в кассу' : 
                '<i class="fas fa-minus-circle"></i> Снять из кассы';
            
            document.getElementById('modalCashName').innerHTML = `Касса: <span style="color: #17a2b8;">${cashName}</span>`;
            document.getElementById('operationAmount').value = '';
            document.getElementById('operationName').value = operationType === 'deposit' ? 'Внесение наличных' : 'Снятие наличных';
            
            // Меняем цвет кнопки подтверждения
            const confirmBtn = document.getElementById('confirmOperationBtn');
            if (operationType === 'deposit') {
                confirmBtn.className = 'btn btn-deposit';
            } else {
                confirmBtn.className = 'btn btn-withdraw';
            }
            
            const modalElement = document.getElementById('operationModal');
            const modal = new bootstrap.Modal(modalElement);
            modal.show();
        };
        
        // Подтверждение операции
        document.getElementById('confirmOperationBtn').addEventListener('click', function() {
            const amount = parseFloat(document.getElementById('operationAmount').value);
            const operationName = document.getElementById('operationName').value.trim();
            
            if (isNaN(amount) || amount <= 0) {
                alert('Пожалуйста, введите корректную сумму (больше 0)');
                return;
            }
            
            if (operationName === '') {
                alert('Пожалуйста, введите наименование операции');
                return;
            }
            
            // Для снятия проверяем достаточно ли средств
            if (currentOperationType === 'withdraw') {
                const currentAmount = getCashAmount(currentCash);
                if (amount > currentAmount) {
                    alert(`Недостаточно средств в кассе "${currentCash}". Доступно: ${currentAmount} ₽`);
                    return;
                }
            }
            
            // Создаем запись
            const signedAmount = currentOperationType === 'deposit' ? amount : -amount;
            const operationTypeText = currentOperationType === 'deposit' ? 'Приход' : 'Расход';
            
            const newRecord = {
                id: generateId(),
                name: operationName,
                amount: signedAmount,
                type: operationTypeText,
                cash: currentCash,
                date: new Date().toLocaleString('ru-RU'),
                timestamp: Date.now()
            };
            
            saveRecord(newRecord);
            
            // Закрываем модальное окно
            const modalElement = document.getElementById('operationModal');
            const modal = bootstrap.Modal.getInstance(modalElement);
            modal.hide();
            
            // Обновляем отображение
            displayCashCards();
            
            // Показываем уведомление
            const actionText = currentOperationType === 'deposit' ? 'Внесено' : 'Снято';
            alert(`${actionText} ${amount} ₽ в кассу "${currentCash}"`);
        });
        
        // Инициализация
        displayCashCards();
        
        // Обновляем каждые 2 секунды
        setInterval(displayCashCards, 2000);
    </script>
</body>
</html>
