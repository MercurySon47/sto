<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Сто Учет - Все записи</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background-color: #121212;
            color: #ffffff;
            height: 100vh;
            overflow: hidden;
            padding: 12px;
        }
        
        .container-custom {
            max-width: 100%;
            margin: 0 auto;
            padding: 0 5px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        
        h1 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            flex-shrink: 0;
        }
        
        .header-row {
            flex-shrink: 0;
        }
        
        .income {
            color: #51cf66;
            font-weight: 600;
        }
        
        .expense {
            color: #ff6b6b;
            font-weight: 600;
        }
        
        /* Контейнер таблицы с фиксированной высотой */
        .table-wrapper {
            flex-shrink: 1;
            min-height: 0;
            margin: 0 0 8px 0;
        }
        
        .table-container {
            background: #1e1e2e;
            border-radius: 15px;
            border: 1px solid #2d2d44;
            overflow: hidden;
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        
        /* Здесь скроллятся только строки */
        .table-scroll {
            overflow-y: auto;
            flex: 1;
            min-height: 0;
        }
        
        /* Кастомный скроллбар */
        .table-scroll::-webkit-scrollbar {
            width: 6px;
        }
        
        .table-scroll::-webkit-scrollbar-track {
            background: #2d2d44;
            border-radius: 10px;
        }
        
        .table-scroll::-webkit-scrollbar-thumb {
            background: #007acc;
            border-radius: 10px;
        }
        
        .table-scroll::-webkit-scrollbar-thumb:hover {
            background: #005fa3;
        }
        
        .table {
            color: #ffffff;
            margin-bottom: 0;
            font-size: 13px;
            width: 100%;
        }
        
        .table thead th {
            background-color: #2d2d44;
            color: #ffffff;
            border-color: #3d3d5c;
            font-size: 12px;
            padding: 10px 6px;
            font-weight: 500;
        }
        
        .table tbody tr:last-child td {
            border-bottom: none;
        }
        
        .table td {
            border-color: #2d2d44;
            padding: 10px 6px;
            vertical-align: middle;
        }
        
        .btn-primary {
            background-color: #007acc;
            border-color: #007acc;
            padding: 8px 16px;
            font-size: 14px;
        }
        
        .stats-card {
            background: #1e1e2e;
            border: 1px solid #2d2d44;
            border-radius: 15px;
            padding: 10px 12px;
            margin: 0 0 8px 0;
            flex-shrink: 0;
        }
        
        .stats-card h5 {
            margin-bottom: 5px;
            font-size: 0.9rem;
        }
        
        .stats-card p {
            margin-bottom: 3px;
            font-size: 0.85rem;
        }
        
        .badge {
            font-size: 11px;
            padding: 4px 8px;
        }
        
        .badge.bg-success {
            background-color: #51cf66 !important;
        }
        
        .badge.bg-danger {
            background-color: #ff6b6b !important;
        }
        
        .badge-cash {
            background-color: #17a2b8;
            color: white;
        }
        
        .badge-cash2 {
            background-color: #28a745;
            color: white;
        }
        
        .badge-cash3 {
            background-color: #6c757d;
            color: white;
        }
        
        @media (max-width: 480px) {
            .table {
                font-size: 12px;
            }
            .table td, 
            .table th {
                padding: 8px 4px;
            }
            .stats-card {
                padding: 8px 10px;
            }
            .stats-card p {
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="container-custom">
        <div class="header-row">
            <div class="d-flex justify-content-between align-items-center mb-2 flex-wrap gap-2">
                <h1><i class="fas fa-database"></i> Все записи</h1>
                <a href="index.html" class="btn btn-primary">
                    <i class="fas fa-arrow-left"></i> Назад
                </a>
            </div>
        </div>
        
        <div class="table-wrapper" style="flex: 1; min-height: 0;">
            <div class="table-container">
                <div class="table-scroll">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>№</th>
                                <th>Операция</th>
                                <th>Сумма</th>
                                <th>Тип</th>
                                <th>Касса</th>
                                <th>Дата</th>
                            </tr>
                        </thead>
                        <tbody id="recordsTable">
                            <tr>
                                <td colspan="6" class="text-center">Загрузка...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        
        <div class="stats-card py-0 my-5" id="statsCard" style="display: none;">
            <h5><i class="fas fa-chart-line"></i> Статистика</h5>
            <p><strong id="totalIncome" style="color: #51cf66;">0</strong> ₽ - приход</p>
            <p><strong id="totalExpense" style="color: #ff6b6b;">0</strong> ₽ - расход</p>
            <p><strong id="balance">0</strong> ₽ - баланс</p>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'sto_finance_records';
        
        function getAllRecords() {
            const records = localStorage.getItem(STORAGE_KEY);
            return records ? JSON.parse(records) : [];
        }
        
        function getCashBadgeClass(cash) {
            switch(cash) {
                case 'Наличные': return 'badge-cash2';
                case 'Безнал': return 'badge-cash';
                case 'Перевод Мир': return 'badge-cash3';
                default: return 'badge-cash3';
            }
        }
        
        function formatDate(timestamp) {
            const date = new Date(timestamp);
            const day = date.getDate().toString().padStart(2, '0');
            const month = (date.getMonth() + 1).toString().padStart(2, '0');
            return `${day}.${month}`;
        }
        
        function displayRecords() {
            let records = getAllRecords();
            const tbody = document.getElementById('recordsTable');
            const statsCard = document.getElementById('statsCard');
            
            if (records.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="text-center">Нет записей</td></tr>';
                statsCard.style.display = 'none';
                return;
            }
            
            statsCard.style.display = 'block';
            
            records.sort((a, b) => b.timestamp - a.timestamp);
            
            let totalIncome = 0;
            let totalExpense = 0;
            
            tbody.innerHTML = records.map((record, index) => {
                const amount = Math.abs(record.amount);
                if (record.type === 'Приход') totalIncome += amount;
                else totalExpense += amount;
                
                const sign = record.type === 'Приход' ? '+' : '−';
                const sumDisplay = `${sign} ${amount} ₽`;
                const sequentialId = index + 1;
                const cash = record.cash || 'Не указана';
                const cashBadgeClass = getCashBadgeClass(cash);
                const shortDate = formatDate(record.timestamp);
                const operationName = record.name.length > 15 ? record.name.slice(0, 15) + '...' : record.name;
                
                return `
                    <tr>
                        <td><strong>${sequentialId}</strong></td>
                        <td title="${record.name}">${operationName}</td>
                        <td class="${record.type === 'Приход' ? 'income' : 'expense'}">
                            ${sumDisplay}
                        </td>
                        <td>
                            <span class="badge ${record.type === 'Приход' ? 'bg-success' : 'bg-danger'}">
                                ${record.type === 'Приход' ? 'Доход' : 'Расход'}
                            </span>
                        </td>
                        <td>
                            <span class="badge ${cashBadgeClass}">
                                ${cash}
                            </span>
                        </td>
                        <td><small>${shortDate}</small></td>
                    </tr>
                `;
            }).join('');
            
            const balance = totalIncome - totalExpense;
            
            document.getElementById('totalIncome').textContent = totalIncome.toLocaleString('ru-RU');
            document.getElementById('totalExpense').textContent = totalExpense.toLocaleString('ru-RU');
            document.getElementById('balance').textContent = balance.toLocaleString('ru-RU');
            document.getElementById('balance').style.color = balance >= 0 ? '#51cf66' : '#ff6b6b';
        }
        
        displayRecords();
        
        setInterval(displayRecords, 2000);
    </script>
</body>
</html>
